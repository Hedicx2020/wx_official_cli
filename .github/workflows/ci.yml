name: gh-ui-cli

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  cli-light:
    name: CLI light checks (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Unit tests
        run: uv run --extra full python -m unittest discover -s tests

      - name: CLI help
        run: uv run gh-ui --help

      - name: API-base manifest/invoke/smoke/verify integration
        run: uv run python -m unittest tests.test_cli_http_integration

      - name: Package build
        run: uv build

      - name: Install built wheel
        shell: bash
        run: python -m pip install dist/*.whl

      - name: Installed wheel CLI smoke
        env:
          GH_UI_CLI_PROFILE: ${{ runner.temp }}/gh-ui-profile.json
        run: |
          gh-ui --help
          gh-ui profile set --api-token ci-api --access-token ci-access --server primary
          gh-ui profile get
          gh-ui deps --requirements tests/fixtures/minimal_requirements.txt --strict

      - name: Installed wheel API-base verify report
        run: gh-ui runtime-verify verify-${{ runner.os }}-py${{ matrix.python-version }}.json

      - name: Print installed wheel verify report
        shell: bash
        run: |
          echo GH_UI_VERIFY_REPORT_BEGIN
          cat verify-${{ runner.os }}-py${{ matrix.python-version }}.json
          echo GH_UI_VERIFY_REPORT_END

      - name: Upload verify report
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: gh-ui-verify-${{ runner.os }}-py${{ matrix.python-version }}
          path: verify-${{ runner.os }}-py${{ matrix.python-version }}.json
