name: wx-official-cli

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  wx-official-cli:
    name: wx-official-cli checks (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Package build
        run: uv build

      - name: Unit tests
        run: |
          uv run python -m unittest discover -s tests -p "test_wx_official_cli.py"
          uv run python -m unittest discover -s tests/wechat

      - name: CLI help
        run: |
          uv run wx-official-cli --help
          uv run wx-official-cli manifest

      - name: Install built wheel
        shell: bash
        run: python -m pip install dist/*.whl

      - name: Installed wheel smoke
        run: |
          wx-official-cli --help
          wx-official-cli manifest
          wx-official-cli status
